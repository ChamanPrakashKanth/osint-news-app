<!DOCTYPE html>
<html>
<head>
<title>Defense OSINT News</title>

<style>

body{
font-family: Arial;
background:#0b0f19;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.card{
background:#151c2c;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

.card a{
color:#4da3ff;
text-decoration:none;
}

.card a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<h1>🛰 Defense OSINT News</h1>

<div id="news"></div>

<script>

fetch("/api/news")

.then(res => res.json())

.then(data => {

let articles = data.articles || data;

let html = "";

articles.slice(0,20).forEach(a => {

html += `
<div class="card">
<h3>${a.title}</h3>
<p>${a.description || ""}</p>
<a href="${a.url}" target="_blank">Read full article</a>
</div>
`;

});

document.getElementById("news").innerHTML = html;

});

</script>

</body>
</html>
